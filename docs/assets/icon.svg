<!-- STARTER app-icon / avatar (square, works on light & dark). Editable draft.
     Convert <text> to outlines before any final/published use. Tile center = (32, 32). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="laravel-api icon">
  <rect x="2" y="2" width="60" height="60" rx="16" fill="#20242E"/>
  <!-- braces: symmetric about x=32, vertically centered at y=32 -->
  <g font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,monospace" font-weight="700" font-size="34" fill="#F9492B">
    <text x="29" y="32" text-anchor="end"   dominant-baseline="central">{</text>
    <text x="35" y="32" text-anchor="start" dominant-baseline="central">}</text>
  </g>
  <!-- chevron drawn as a stroke: bbox centered on (32, 32) -->
  <path d="M 29.5 27 L 34.5 33.5 L 29.5 40" fill="none" stroke="#FFFFFF"
        stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
